<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SingSaver Blog Prototype v9</title>
    
    <!-- React & Babel from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Albert Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        #root {
            min-height: 100vh;
        }
        
        /* Password Screen */
        .password-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #fafafa;
        }
        .password-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            margin: 20px;
        }
        .password-logo {
            font-size: 32px;
            font-weight: 800;
            color: #0d7a9f;
            margin-bottom: 8px;
            text-align: center;
        }
        .password-subtitle {
            font-size: 14px;
            color: #616161;
            text-align: center;
            margin-bottom: 32px;
        }
        .password-label {
            font-size: 14px;
            font-weight: 600;
            color: #424242;
            margin-bottom: 8px;
            display: block;
        }
        .password-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        .password-input:focus {
            outline: none;
            border-color: #0d7a9f;
        }
        .password-button {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 600;
            background: #0d7a9f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        .password-button:hover {
            background: #065a75;
        }
        .password-error {
            color: #dc2626;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
        }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #fafafa;
        }
    </style>
</head>
<body>
    <div id="password-gate"></div>
    <div id="root"></div>

    <script>
        // Password Protection
        const CORRECT_PASSWORD = 'The-Future-Blog';
        
        function checkPassword() {
            return sessionStorage.getItem('singsaver_auth') === 'authorized';
        }
        
        function showPasswordScreen() {
            const gate = document.getElementById('password-gate');
            gate.innerHTML = `
                <div class="password-screen">
                    <div class="password-box">
                        <div class="password-logo">SingSaver</div>
                        <div class="password-subtitle">Blog Prototype v9 - Protected Access</div>
                        <label class="password-label">Enter Password</label>
                        <input 
                            type="password" 
                            class="password-input" 
                            id="password-field" 
                            placeholder="Enter password to continue"
                            autocomplete="off"
                        />
                        <button class="password-button" onclick="submitPassword()">Access Prototype</button>
                        <div id="error-message" class="password-error" style="display: none;"></div>
                    </div>
                </div>
            `;
            
            // Allow Enter key to submit
            document.getElementById('password-field').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    submitPassword();
                }
            });
            
            // Focus on input
            setTimeout(() => {
                document.getElementById('password-field').focus();
            }, 100);
        }
        
        function submitPassword() {
            const input = document.getElementById('password-field');
            const error = document.getElementById('error-message');
            const password = input.value;
            
            if (password === CORRECT_PASSWORD) {
                sessionStorage.setItem('singsaver_auth', 'authorized');
                document.getElementById('password-gate').style.display = 'none';
                loadPrototype();
            } else {
                error.textContent = 'Incorrect password. Please try again.';
                error.style.display = 'block';
                input.value = '';
                input.focus();
            }
        }
        
        function loadPrototype() {
            document.getElementById('root').innerHTML = '<div class="loading"><div style="text-align: center;"><div style="font-size: 24px; font-weight: 800; color: #0d7a9f; margin-bottom: 8px;">SingSaver</div><div style="font-size: 14px; color: #616161;">Loading prototype...</div></div></div>';
            
            // Load the component script
            const script = document.createElement('script');
            script.type = 'text/babel';
            script.src = './prototype.js';
            script.onload = function() {
                const renderScript = document.createElement('script');
                renderScript.type = 'text/babel';
                renderScript.textContent = `
                    const root = ReactDOM.createRoot(document.getElementById('root'));
                    root.render(<CombinedPrototype />);
                `;
                document.body.appendChild(renderScript);
            };
            document.body.appendChild(script);
        }
        
        // Check authentication on load
        if (checkPassword()) {
            loadPrototype();
        } else {
            showPasswordScreen();
        }
    </script>
</body>
</html>
