<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SingSaver Blog Prototype v9</title>
    
    <!-- Load React, ReactDOM, and Babel from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }
        #root {
            min-height: 100vh;
        }
        /* Loading state */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Albert Sans', sans-serif;
            color: #0d7a9f;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading">
            <div style="text-align: center;">
                <div style="font-size: 24px; font-weight: 800; margin-bottom: 8px;">SingSaver</div>
                <div style="font-size: 14px; color: #616161;">Loading prototype...</div>
            </div>
        </div>
    </div>

    <!-- Load the React component from external file -->
    <script type="text/babel" src="./src/SingSaver_Combined_v9.jsx"></script>
    
    <!-- Render the component -->
    <script type="text/babel">
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CombinedPrototype />);
    </script>
</body>
</html>
