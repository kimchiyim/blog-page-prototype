<head>

    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        #root { min-height: 100vh; }
        .password-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #fafafa; }
        .password-box { background: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; margin: 20px; }
        .password-logo { font-size: 32px; font-weight: 800; color: #0d7a9f; margin-bottom: 8px; text-align: center; }
        .password-subtitle { font-size: 14px; color: #616161; text-align: center; margin-bottom: 32px; }
        .password-label { font-size: 14px; font-weight: 600; color: #424242; margin-bottom: 8px; display: block; }
        .password-input { width: 100%; padding: 12px 16px; font-size: 15px; border: 1px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; font-family: inherit; margin-bottom: 16px; transition: border-color 0.2s; }
        .password-input:focus { outline: none; border-color: #0d7a9f; }
        .password-button { width: 100%; padding: 12px 16px; font-size: 15px; font-weight: 600; background: #0d7a9f; color: white; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; transition: background 0.2s; }
        .password-button:hover { background: #065a75; }
        .password-error { color: #dc2626; font-size: 13px; margin-top: 8px; text-align: center; }
    </style>
</head>
<body>
    <div id="password-gate"></div>
    <div id="root"></div>

    <script>
        const CORRECT_PASSWORD = 'The-Future-Blog';
        
        function checkPassword() {
            return sessionStorage.getItem('singsaver_auth') === 'authorized';
        }
        
        function showPasswordScreen() {
            document.getElementById('password-gate').innerHTML = `
                <div class="password-screen">
                    <div class="password-box">
                        <div class="password-logo">SingSaver</div>
                        <div class="password-subtitle">Blog Prototype v9 - Protected Access</div>
                        <label class="password-label">Enter Password</label>
                        <input type="password" class="password-input" id="password-field" placeholder="Enter password to continue" autocomplete="off" />
                        <button class="password-button" onclick="submitPassword()">Access Prototype</button>
                        <div id="error-message" class="password-error" style="display: none;"></div>
                    </div>
                </div>
            `;
            document.getElementById('password-field').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') submitPassword();
            });
            setTimeout(() => document.getElementById('password-field').focus(), 100);
        }
        
        function submitPassword() {
            const input = document.getElementById('password-field');
            const error = document.getElementById('error-message');
            if (input.value === CORRECT_PASSWORD) {
                sessionStorage.setItem('singsaver_auth', 'authorized');
                document.getElementById('password-gate').style.display = 'none';
                loadPrototype();
            } else {
                error.textContent = 'Incorrect password. Please try again.';
                error.style.display = 'block';
                input.value = '';
                input.focus();
            }
        }
        
        function loadPrototype() {
            // Prototype will be loaded from the embedded script below
            const renderScript = document.createElement('script');
            renderScript.type = 'text/babel';
            renderScript.textContent = 'const root = ReactDOM.createRoot(document.getElementById("root")); root.render(<CombinedPrototype />);';
            document.body.appendChild(renderScript);
        }
        
        if (checkPassword()) {
            loadPrototype();
        } else {
            showPasswordScreen();
        }
    </script>

/* ═══ EXPANDABLE FLOW ITEM ═══ */
function FlowItem({ num, id, label, tag, tagColor, desc, isNew, isRemoved, isMoved, expanded, onToggle }) {
  const badge = isNew ? { l: "NEW", bg: "#dcfce7", c: "#15803d" } : isRemoved ? { l: "REMOVED", bg: "#fee2e2", c: "#dc2626" } : isMoved ? { l: "MOVED", bg: "#fef3c7", c: "#92400e" } : null;
  const Preview = PREVIEW_MAP[id];
  const canExpand = !!Preview && !isRemoved;

  return (
    <div style={{ borderBottom: `1px solid ${C.border}`, opacity: isRemoved ? 0.45 : 1 }}>
      <div onClick={canExpand ? onToggle : undefined} style={{ display: "flex", gap: 12, alignItems: "flex-start", padding: "10px 0", cursor: canExpand ? "pointer" : "default" }}>
        <div style={{ width: 28, height: 28, borderRadius: "50%", background: tagColor + "15", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 11, fontWeight: 700, color: tagColor, fontFamily: F }}>{num}</div>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 2, flexWrap: "wrap" }}>
            <span style={{ fontFamily: F, fontSize: 14, fontWeight: 600, color: C.ink, textDecoration: isRemoved ? "line-through" : "none" }}>{label}</span>
            {badge && <span style={{ fontFamily: F, fontSize: 9, fontWeight: 700, letterSpacing: "0.5px", color: badge.c, background: badge.bg, borderRadius: 3, padding: "1px 6px" }}>{badge.l}</span>}
          </div>
          {desc && <div style={{ fontFamily: F, fontSize: 12, lineHeight: "18px", color: C.mute }}>{desc}</div>}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
          <Tag label={tag} color={tagColor} />
          {canExpand && <span style={{ fontSize: 10, color: C.mute, transform: expanded ? "rotate(180deg)" : "none", transition: "0.15s" }}>▼</span>}
        </div>
      </div>
      {expanded && Preview && (
